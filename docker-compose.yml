services:
  clipforge-api:
    build: .
    container_name: clipforge-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
      NODE_ENV: production
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: clipforge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
